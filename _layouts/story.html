---
layout: default
---
<br>
<div class="post">
    <h1 class="title">{{ page.title }}</h1>

    <div class="metadata">
        <i data-feather="calendar"></i>
        Posted: <time datetime="{{ post.date }}">{{ page.date | date: '%B %d, %Y'}}</time> | Words: {{ page.words }} | Reading time: {{ page.rtime }}
        <br/>
       Series: <i data-feather="tag"></i>
        {% for tag in page.tags %}
            {{ tag }}
        {% endfor %}
    </div>
<hr><br>    
    <div class="novel-container"><div class="content">
        {{ content }}


    </div></div>       <br><hr>
</div>
