---
layout: default
---

<h1 class="title"> <a href="/feed/artworks.xml"><img class="rss-icon" src="/static/image/Feed-icon.svg"></a> {{
    page.title }}</h1>

<div class="artworks">
    {% assign artworks = site.artworks | sort: "stamp" %}
    {% for artwork in artworks %}
    <div class="artworks-item">
        <a data-magnify="gallery" data-src="{{ artwork.cover }}" data-caption="{{ artwork.title }}" data-group="a"
            href="{{ artwork.cover }}">
            <img src="/static/image/blank.png" data-echo="{{ artwork.thumbnail }}" alt="">
        </a>
    </div>
    {% endfor %}
</div>

{% include lazyload.html %}
