---
layout: default
---
<br>
<div class="post">
    <h1 class="title">{{ page.title }}</h1>

    <div class="metadata">
        <i data-feather="calendar"></i>
        📅Posted: <time datetime="{{ post.date }}">{{ page.date | date: '%B %d, %Y'}}</time> ⭐ Series: <i data-feather="tag"></i>
        {% for tag in page.tags %}
            {{ tag }}
        {% endfor %}
        <br/>✒️ Words: {{ page.words }} ⌛ Reading time: {{ page.rtime }}
        <br/>

    </div>
<hr><br>    
    <div class="novel-container"><div class="content">
        {{ content }}


    </div></div>       <br><hr>
</div>
