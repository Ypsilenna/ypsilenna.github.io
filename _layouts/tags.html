---
layout: default
---

<h1 class="title">{{ page.title }}</h1>

<div class="post-list">
  {% for tag in tags %}
	<h3 id="{{ tag | slugify }}">{{ tag }}</h3>
	<ul>
    {% for post in site.posts %}
      {% if post.tags contains tag %}
      <li>
        <a href="{{ post.url }}"> {{ post.title }} </a>
        <small>{{ post.date | date: "%B %-d, %Y" }}</small>
      </li>
      {% endif %}
    {% endfor %}
	</ul>
{% endfor %}
</div>

<div class="infinite-spinner"></div>
