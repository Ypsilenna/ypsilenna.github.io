<div class="post">

  <div class="metadata">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-calendar-heart-fill"
      viewBox="0 0 16 16">
      <path
        d="M4 .5a.5.5 0 0 0-1 0V1H2a2 2 0 0 0-2 2v1h16V3a2 2 0 0 0-2-2h-1V.5a.5.5 0 0 0-1 0V1H4zM16 14V5H0v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2M8 7.993c1.664-1.711 5.825 1.283 0 5.132-5.825-3.85-1.664-6.843 0-5.132" />
    </svg> Posted: <time datetime="{{ post.date }}">{{ page.date | date: '%B %d, %Y'}}</time>
    <br />

  </div>
  <hr><br>
  <div style="text-align: justify">
    <div class="novel-container">
      <div class="content">
        <a data-magnify="gallery" data-src="" data-caption="{{ page.title }}" data-group="a" href="{{ page.cover }}">
          <img src="{{ page.cover }}" alt="" class="pixel-shrink"></a><br><br>
        <h3> Author's note</h3>
        <hr>{{ content }}<br>
        <h3>Like and support</h3>
        <button class="iine-button" data-icon="💜" aria-hidden="true">
        </button>
        <script type='text/javascript' src='https://storage.ko-fi.com/cdn/widget/Widget_2.js'></script>
        <script
          type='text/javascript'>kofiwidget2.init('Support me on Ko-fi', '#72a4f2', 'E1E268WX'); kofiwidget2.draw();</script>

      </div> <br>
      <h3> Comments </h3>
      <small>(You need to be logged-in to Github to write comments.)</small><br><br>
    </div>
  </div>
</div>

<script>$(document).ready(function () {
    const win = $(window);
    const doc = $(document);
    const progressBar = $('progress');
    const progressLabel = $('.progress-label');
    const setValue = () => win.scrollTop();
    const setMax = () => doc.height() - win.height();
    const setPercent = () => Math.round(win.scrollTop() / (doc.height() - win.height()) * 100);

    progressLabel.text(setPercent() + '%');
    progressBar.attr({ value: setValue(), max: setMax() });

    doc.on('scroll', () => {
      progressLabel.text(setPercent() + '%');
      progressBar.attr({ value: setValue() });
    });

    win.on('resize', () => {
      progressLabel.text(setPercent() + '%');
      progressBar.attr({ value: setValue(), max: setMax() });
    })
  });</script>
<script>function readingTime() {
    const text = document.getElementById("article").innerText;
    const wpm = 225;
    const words = text.trim().split(/\s+/).length;
    const time = Math.ceil(words / wpm);
    document.getElementById("time").innerText = time;
    document.getElementById("words").innerText = words;
  }
  readingTime();</script>

<div class="giscus"></div>

<script>
  (function () {
    function getCurrentTheme() {
      return document.body.getAttribute("data-theme") === "dark" ? "dark" : "light";
    }

    // Inject giscus with the theme that's already active on the page
    function loadGiscus() {
      const script = document.createElement("script");
      script.src = "https://giscus.app/client.js";
      script.setAttribute("data-repo", "Ypsilenna/ypsilenna.github.io");
      script.setAttribute("data-repo-id", "R_kgDOLQU90Q");
      script.setAttribute("data-category", "General");
      script.setAttribute("data-category-id", "DIC_kwDOLQU90c4C-4tV");
      script.setAttribute("data-mapping", "pathname");
      script.setAttribute("data-reactions-enabled", "0");
      script.setAttribute("data-input-position", "bottom");
      script.setAttribute("data-emit-metadata", "0");
      script.setAttribute("crossorigin", "anonymous");
      script.setAttribute("data-theme", getCurrentTheme());
      script.async = true;
      document.querySelector(".giscus").appendChild(script);
    }
    loadGiscus();

    // Push a live theme update into the already-mounted giscus iframe
    function updateGiscusTheme(theme) {
      const iframe = document.querySelector("iframe.giscus-frame");
      if (!iframe) return;
      iframe.contentWindow.postMessage(
        { giscus: { setConfig: { theme: theme } } },
        "https://giscus.app"
      );
    }

    // Second listener
    document.getElementById("theme-toggle").addEventListener("click", () => {
      setTimeout(() => updateGiscusTheme(getCurrentTheme()), 0);
    });
  })();
</script>
